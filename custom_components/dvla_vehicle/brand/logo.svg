<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- White background -->
  <rect width="512" height="512" fill="white"/>
  <!-- Green triangle -->
  <polygon points="256,48 472,420 40,420" fill="#3ABD44"/>
  <!-- White border -->
  <polygon points="256,62 458,408 54,408" fill="none" stroke="white" stroke-width="10"/>
  <!-- Stylized road/path going up through the triangle -->
  <path d="M256 95 L240 155 L248 155 L248 185 L256 185 L256 175 L264 175 L264 185 L272 185 L272 155 L280 155 L268 95 Z" fill="white"/>
  <!-- DVLA in bold white letters inside triangle -->
  <text x="256" y="290" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="3">DVLA</text>
  <!-- Black serif text below triangle -->
  <text x="256" y="460" font-family="Georgia, serif" font-size="24" fill="black" text-anchor="middle">Driver and Vehicle</text>
  <text x="256" y="490" font-family="Georgia, serif" font-size="24" fill="black" text-anchor="middle">Licensing Agency</text>
  <!-- Registered trademark symbol -->
  <text x="385" y="105" font-family="Arial, sans-serif" font-size="16" fill="black">®</text>
</svg>